<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой Чат</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://onesignal.com" defer></script>
    <style>
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        @keyframes bubblePop { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        
        html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; background: #1e1135; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #1d2671 0%, #c33764 100%); display: flex; justify-content: center; align-items: center; box-sizing: border-box; color: #fff; user-select: none; -webkit-user-select: none; }
        
        .win { background: rgba(20, 20, 35, 0.45); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 16px; width: 100%; max-width: 480px; height: 100dvh; display: none; flex-direction: column; box-sizing: border-box; will-change: transform, opacity; }
        .active { display: flex; animation: slideInRight 0.28s cubic-bezier(0.32, 0.94, 0.6, 1) forwards; }
        
        h3, h4 { margin: 0 0 12px 0; font-weight: 600; text-align: center; font-size: 16px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.06); border-radius: 14px; font-size: 16px; box-sizing: border-box; color: #fff; outline: none; -webkit-appearance: none; }
        button { width: 100%; color: white; border: none; padding: 14px; font-size: 15px; border-radius: 14px; cursor: pointer; font-weight: bold; margin-bottom: 8px; transition: opacity 0.1s; -webkit-tap-highlight-color: transparent; }
        button:active { opacity: 0.8; }
        
        .box { border: 1px solid rgba(255,255,255,0.08); padding: 8px; background: rgba(0, 0, 0, 0.12); border-radius: 18px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 15px; word-wrap: break-word; display: flex; flex-direction: column; box-shadow: 0 1px 4px rgba(0,0,0,0.15); animation: bubblePop 0.15s cubic-bezier(0.1, 1, 0.1, 1); user-select: text; -webkit-user-select: text; }
        .msg.my { background: #2481cc; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.other { background: rgba(255,255,255,0.15); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 12px; margin-top: 4px; max-height: 200px; object-fit: cover; }
        .swipe-container { position: relative; width: 100%; overflow: hidden; border-radius: 14px; background: rgba(255, 255, 255, 0.03); height: 50px; margin-bottom: 4px; flex-shrink: 0; }
        .row { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; background: rgba(255,255,255,0.05); border-radius: 14px; font-size: 15px; cursor: pointer; box-sizing: border-box; transition: transform 0.2s ease; will-change: transform; z-index: 2; touch-action: pan-y; -webkit-tap-highlight-color: transparent; }
        .swipe-btn { position: absolute; right: 0; top: 0; height: 100%; width: 80px; background: transparent; color: #ff4d4d; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; z-index: 1; cursor: pointer; border-radius: 0 14px 14px 0; letter-spacing: 0.5px; }
        .admin-section { background: rgba(220, 53, 69, 0.12); border: 1px solid rgba(220, 53, 69, 0.25); border-radius: 16px; padding: 10px; margin-bottom: 10px; display: none; }
        .in-app-alert { position: fixed; top: -80px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; background: rgba(25, 25, 40, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 12px 16px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 9999; display: flex; flex-direction: column; gap: 4px; transition: top 0.3s ease; }
        .in-app-alert.show { top: 12px; }
        .in-app-title { font-weight: bold; font-size: 13px; color: #4fc3f7; }
        .in-app-body { font-size: 14px; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tg-input-bar { display: flex; align-items: center; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 22px; padding: 2px 10px; gap: 4px; box-sizing: border-box; flex: 1; position: relative; }
        .tg-field { flex: 1; background: transparent; border: none; outline: none; padding: 10px 2px; font-size: 16px; color: #fff; max-height: 90px; resize: none; font-family: inherit; }
        .tg-icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border-radius: 50%; -webkit-tap-highlight-color: transparent; }
        .tg-icon-btn:active { background: rgba(255,255,255,0.1); }
        .tg-send-btn { width: 40px; height: 40px; background: #2481cc; color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; border-radius: 50%; border: none; outline: none; padding: 0; margin-left: 6px; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
        .tg-send-btn:active { background: #1c6aa8; transform: scale(0.96); }
        .tg-emoji-pop { position: absolute; bottom: 60px; left: 0; width: 100%; background: rgba(25, 20, 35, 0.96); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; box-shadow: 0 -8px 24px rgba(0,0,0,0.3); display: none; padding: 12px; box-sizing: border-box; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 1000; justify-items: center; font-size: 24px; }
        .tg-emoji-pop.open { display: grid; }
    </style>
</head>
<body>
    <div id="inAppNotification" class="in-app-alert" onclick="closeInAppAlert()">
        <span id="inAppTitle" class="in-app-title">Новое сообщение</span>
        <span id="inAppBody" class="in-app-body">Текст...</span>
    </div>
    <div id="boxAuth" class="win active" style="justify-content: center;">
        <div style="text-align: center; margin-bottom: 25px;"><span style="font-weight: bold; font-size: 17px;">(МСБ55115) МЕССЕНДЖЕР v.001</span></div>
        <h3>🔑 Вход и Регистрация</h3>
        <div id="authStatus" style="color:#ff6b6b; font-size:14px; margin-bottom:12px; text-align:center; font-weight:bold; min-height: 20px;"></div>
        <input type="text" id="loginInp" placeholder="Логин (английские буквы)" autocomplete="off" autocapitalize="none">
        <input type="password" id="passInp" placeholder="Пароль">
        <input type="text" id="idInp" placeholder="Ваш ID (при регистрации)" autocomplete="off">
        <button style="background: #2481cc; margin-top: 5px;" onclick="appLogin()">Войти</button>
        <button style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);" onclick="appRegister()">Зарегистрироваться</button>
    </div>
    <div id="boxMain" class="win">
        <div style="display: flex; align-items: center; justify-content: center; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 10px;">
            <span style="font-size: 13px; font-weight: bold; color: rgba(255,255,255,0.5);">(МСБ55115) МЕССЕНДЖЕР</span>
        </div>
        <h4 id="lblUser" style="color: #4fc3f7; font-size:14px; text-align:left; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 10px;">Вы: ...</h4>
        <div id="adminPanel" class="admin-section">
            <h4 style="font-size: 13px; color: #ff8585; text-align: left; margin-bottom: 6px;">🛠️ Управление (Админ)</h4>
            <div class="box" id="adminUsersList" style="height: 80px; background: rgba(0,0,0,0.3);"></div>
        </div>
        <div style="position: relative; margin-bottom: 15px; display: flex; align-items: center;">
            <input type="text" id="searchIdInp" placeholder="Поиск контактов по ID..." style="margin: 0; padding-right: 85px; width: 100%; height: 46px;">
            <button style="position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: #28a745; width: auto; padding: 0 14px; height: 34px; margin: 0; font-size: 13px; border-radius: 10px;" onclick="actionFindAndAdd()">Найти</button>
        </div>
        <h4 style="text-align: left; font-size: 13px; margin: 5px 4px; color: rgba(255,255,255,0.4); text-transform: uppercase;">Мои Диалоги:</h4>
        <div class="box" id="areaUsers" style="flex: 1;">Загрузка контактов...</div>
    </div>
    <div id="boxChatRoom" class="win" style="padding: 12px 14px 16px 14px;">
        <div style="display: flex; align-items: center; justify-content: space-between; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 8px; height: 40px; flex-shrink: 0;">
            <div style="font-size: 16px; font-weight: bold; color: #2481cc; cursor: pointer; padding: 4px 8px 4px 0;" onclick="backToMainSearch()">⬅ Назад</div>
            <h4 style="margin: 0; font-size: 16px; max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"><span id="chatTargetLabel">@чат</span></h4>
            <div style="width: 55px;"></div> 
        </div>
        <div class="box" id="areaMessages" style="flex: 1; margin-bottom: 10px; background: transparent; border: none; padding: 4px 0;">Загрузка истории...</div>
        <div style="position: relative; width: 100%; display: flex; align-items: center; flex-shrink: 0; margin-top: auto;">
            <div id="emojiPopTray" class="tg-emoji-pop">
                <span class="tg-icon-btn" onclick="addEmoji('😀')">😀</span><span class="tg-icon-btn" onclick="addEmoji('😂')">😂</span><span class="tg-icon-btn" onclick="addEmoji('👍')">👍</span><span class="tg-icon-btn" onclick="addEmoji('❤️')">❤️</span>
                <span class="tg-icon-btn" onclick="addEmoji('🔥')">🔥</span><span class="tg-icon-btn" onclick="addEmoji('🎉')">🎉</span><span class="tg-icon-btn" onclick="addEmoji('😮')">😮</span><span class="tg-icon-btn" onclick="addEmoji('😢')">😢</span>
                <span class="tg-icon-btn" onclick="addEmoji('🚀')">🚀</span><span class="tg-icon-btn" onclick="addEmoji('👀')">👀</span>
            </div>
            <div class="tg-input-bar">
                <label class="tg-icon-btn" id="fileClipBtn" style="margin:0;">📎
                    <input type="file" id="fileInp" style="display:none;" onchange="handleFileSelect(this)">
                </label>
                <textarea id="textInp" class="tg-field" rows="1" placeholder="Cообщение..." onkeydown="if(event.keyCode===13 && !event.shiftKey){event.preventDefault();actionSend();}"></textarea>
                <div class="tg-icon-btn" onclick="toggleEmojiTray(event)">😀</div>
            </div>
            <button class="tg-send-btn" onclick="actionSend()">🚀</button>
        </div>
    </div>
<script>
    let myAccount = "", myID = "", chatWith = "", chatTimer = null, globalMonitorTimer = null;
    let attachedFile = null; let totalMessagesCount = {}; let isFirstLoadForRoom = {}; let globalKnownMessages = {};
    const URL_FB = "https://my-chat-server-4o0j.onrender.com/"; 
    const msgSound = new Audio("https://mixkit.co");
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({ appId: "a11bd4a6-a783-421e-b975-01f2f1b8a733", autoRegister: true, notifyButton: { enable: false }, workerPath: "OneSignalSDKWorker.js", registrationScope: "/" });
        if (myAccount) { OneSignal.login(myAccount); }
    });
    function toggleEmojiTray(event) { event.stopPropagation(); document.getElementById("emojiPopTray").classList.toggle("open"); }
    document.addEventListener("click", function() { document.getElementById("emojiPopTray").classList.remove("open"); });
    
    function triggerTopBanner(sender, text) { 
        const b = document.getElementById("inAppNotification"); 
        document.getElementById("inAppTitle").innerText = `💬 Новое от @${sender}`; 
        document.getElementById("inAppBody").innerText = text ? text : "📎 Отправил вам файл"; 
        b.classList.add("show"); 
        msgSound.play().catch(e => console.log("Audio block bypass active", e));
        setTimeout(closeInAppAlert, 4000); 
    }
    
    function closeInAppAlert() { document.getElementById("inAppNotification").classList.remove("show"); }
    function addEmoji(emoji) { const input = document.getElementById("textInp"); input.value += emoji; input.focus(); }
    
    function handleFileSelect(input) {
        const file = input.files; if (!file) return;
        if (file.size > 2 * 1024 * 1024) { alert("Файл слишком большой! Максимум 2 МБ."); input.value = ""; return; }
        const reader = new FileReader();
        reader.onload = function(e) { attachedFile = { name: file.name, type: file.type, data: e.target.result }; const clip = document.getElementById("fileClipBtn"); clip.style.background = "rgba(40, 167, 69, 0.3)"; clip.innerText = "✅"; };
        reader.readAsDataURL(file);
    }
    
    function appRegister() {
        const log = document.getElementById("loginInp").value.trim().toLowerCase();
        const pas = document.getElementById("passInp").value;
        const customID = document.getElementById("idInp").value.trim();
        const status = document.getElementById("authStatus");
        if (!log || !pas || !customID) { status.innerText = "Заполните все поля!"; return; }
        status.innerText = "Регистрация...";
        fetch(URL_FB + "users/" + log + ".json")
        .then(r => r.json())
        .then(exists => {
            if (exists) { status.innerText = "Логин занят!"; return; }
            return fetch(URL_FB + "users/" + log + ".json", { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password: pas, id: customID, lastSeen: Date.now() }) });
        })
        .then(res => { if(res) { status.style.color = "#28a745"; status.innerText = "Успешно! Теперь нажмите 'Войти'"; } })
        .catch(() => { status.innerText = "Ошибка сети при регистрации!"; });
    }
    
    function appLogin() {
        const log = document.getElementById("loginInp").value.trim().toLowerCase();
        const pas = document.getElementById("passInp").value;
        const status = document.getElementById("authStatus");
        if (!log || !pas) { status.innerText = "Введите логин и пароль!"; return; }
        status.style.color = "#ff6b6b"; status.innerText = "Проверка...";
        fetch("OneSignalSDKWorker.js").then(res => { if (res.status === 404) { status.innerText = "⚠️ Ошибка: Нет OneSignalSDKWorker.js на сервере!"; } }).catch(() => {});
        fetch(URL_FB + "users/" + log + ".json")
        .then(r => r.json())
        .then(user => {
            if (user && String(user.password) === String(pas)) {
                myAccount = log; myID = user.id;
                document.getElementById("boxAuth").classList.remove("active");
                setTimeout(() => { document.getElementById("boxMain").classList.add("active"); }, 50);
                document.getElementById("lblUser").innerText = "Вы: " + myAccount + " (ID: " + myID + ")";
                window.OneSignalDeferred.push(function(OneSignal) { OneSignal.login(myAccount); if (OneSignal.Notifications) { OneSignal.Notifications.requestPermission(); } });
                if (myAccount === "admin") { document.getElementById("adminPanel").style.display = "block"; loadAdminUsersList(); }
                setInterval(() => { fetch(URL_FB + "users/" + myAccount + "/lastSeen.json", { method: "PUT", body: JSON.stringify(Date.now()) }); }, 10000);
                actionLoadMyContacts();
                startGlobalMessageMonitoring();
            } else { status.innerText = "Неверный логин или пароль!"; }
        }).catch(() => { status.innerText = "Ошибка сервера (нет связи)!"; });
    }
    
    function startGlobalMessageMonitoring() {
        if (globalMonitorTimer) clearInterval(globalMonitorTimer);
        fetch(URL_FB + "messages.json").then(r => r.json()).then(allRooms => {
            if (allRooms) { Object.keys(allRooms).forEach(room => { if (!room.includes(myAccount)) return; Object.keys(allRooms[room]).forEach(msgId => { globalKnownMessages[msgId] = true; }); }); }
        });
        globalMonitorTimer = setInterval(() => {
            fetch(URL_FB + "messages.json").then(r => r.json()).then(allRooms => {
                if (!allRooms) return;
                Object.keys(allRooms).forEach(room => {
                    if (!room.includes(myAccount)) return;
                    Object.keys(allRooms[room]).forEach(msgId => {
                        const m = allRooms[room][msgId];
                        if (!m) return;
                        if (!globalKnownMessages[msgId] && m.sender !== myAccount) {
                            const senderPartner = room.replace(myAccount, "").replace("_", "");
                            if (chatWith !== senderPartner) { triggerTopBanner(m.sender, m.text); }
                        }
                        globalKnownMessages[msgId] = true;
                    });
                });
            });
        }, 3000);
    }
    
    function loadAdminUsersList() {
        fetch(URL_FB + "users.json").then(r => r.json()).then(data => {
            const container = document.getElementById("adminUsersList"); container.innerHTML = ""; if (!data) return;
            Object.keys(data).forEach(log => { if (log === "admin") return; const r = document.createElement("div"); r.className = "row"; r.style.position="static"; r.innerHTML = `<span>👤 <b>${log}</b></span> <button onclick="adminDeleteUser('${log}')">Стереть</button>`; container.appendChild(r); });
        });
    }
    
    function adminDeleteUser(tLog) { if (confirm(`Удалить ${tLog}?`)) { fetch(URL_FB + "users/" + tLog + ".json", { method: "DELETE" }).then(() => { loadAdminUsersList(); actionLoadMyContacts(); }); } }
    
    function actionFindAndAdd() {
        const searchId = document.getElementById("searchIdInp").value.trim(); if (!searchId) return;
        fetch(URL_FB + "users.json").then(r => r.json()).then(allUsers => {
            let foundLog = null;
            if (allUsers) { Object.keys(allUsers).forEach(log => { if (allUsers[log] && String(allUsers[log].id).trim() === String(searchId).trim()) { foundLog = log; } }); }
            if (foundLog) {
                if (foundLog === myAccount) { alert("Нельзя добавить самого себя!"); return; }
                fetch(URL_FB + "contacts/" + myAccount + "/" + foundLog + ".json", { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ id: searchId }) }).then(() => { document.getElementById("searchIdInp").value = ""; actionLoadMyContacts(); });
            } else { alert("Пользователь с таким ID не зарегистрирован в системе!"); }
        });
    }
    function actionLoadMyContacts() {
        fetch(URL_FB + "contacts/" + myAccount + ".json")
        .then(r => r.json())
        .then(contactsData => {
            const area = document.getElementById("areaUsers"); 
            area.innerHTML = contactsData ? "" : "Список пуст. Найдите кого-нибудь по ID выше!"; 
            if (!contactsData) return;
            
            fetch(URL_FB + "users.json")
            .then(r => r.json())
            .then(globalUsers => {
                Object.keys(contactsData).forEach(log => {
                    if (!contactsData[log]) return;
                    
                    const container = document.createElement("div"); container.className = "swipe-container";
                    const row = document.createElement("div"); row.className = "row";
                    
                    let presenceStatus = "<span style='color:rgba(255,255,255,0.4); font-size:12px;'>офлайн</span>";
                    if (globalUsers && globalUsers[log] && globalUsers[log].lastSeen) {
                        let timeDiff = Date.now() - globalUsers[log].lastSeen;
                        if (timeDiff < 25000) {
                            presenceStatus = "<span style='color:#28a745; font-size:12px; font-weight:bold;'>• в сети</span>";
                        } else {
                            let lastDate = new Date(globalUsers[log].lastSeen);
                            presenceStatus = `<span style='color:rgba(255,255,255,0.4); font-size:11px;'>был(а) ${String(lastDate.getHours()).padStart(2,'0')}:${String(lastDate.getMinutes()).padStart(2,'0')}</span>`;
                        }
                    }

                    row.innerHTML = `
                        <div style="display:flex; flex-direction:column; gap:2px;">
                            <span>👤 <b>@${log}</b> <span style="font-size:11px; opacity:0.5;">(ID: ${contactsData[log].id})</span></span>
                            ${presenceStatus}
                        </div>`;
                    
                    const delBtn = document.createElement("div"); delBtn.className = "swipe-btn"; delBtn.innerText = "Удалить";
                    delBtn.onclick = (e) => { e.stopPropagation(); actionDelContact(log); };
                    
                    let startX = 0, startY = 0, currentX = 0, currentY = 0, isSwiping = false, hasMoved = false;
                    row.addEventListener("touchstart", (e) => { startX = e.touches.clientX; startY = e.touches.clientY; isSwiping = true; hasMoved = false; row.style.transition = "none"; }, { passive: true });
                    row.addEventListener("touchmove", (e) => { 
                        if (!isSwiping) return; currentX = e.touches.clientX; currentY = e.touches.clientY; let diffX = currentX - startX; let diffY = currentY - startY;
                        if (Math.abs(diffY) > Math.abs(diffX)) { isSwiping = false; row.style.transform = "translateX(0)"; return; }
                        if (diffX < -5) { hasMoved = true; if (diffX > -80) row.style.transform = `translateX(${diffX}px)`; } 
                    }, { passive: true });
                    row.addEventListener("touchend", () => { isSwiping = false; row.style.transition = "transform 0.2s ease"; let diffX = currentX - startX; if (hasMoved && diffX <= -40) { row.style.transform = "translateX(-80px)"; } else { row.style.transform = "translateX(0)"; } });
                    row.onclick = () => { if (row.style.transform === "translateX(-80px)") { row.style.transform = "translateX(0)"; } else if (!hasMoved) { startPersonalChat(log); } };
                    
                    container.appendChild(delBtn); container.appendChild(row); area.appendChild(container);
                });
            });
        });
    }
    function actionDelContact(tLog) { if (confirm("Удалить из найденных?")) { fetch(URL_FB + "contacts/" + myAccount + "/" + tLog + ".json", { method: "DELETE" }).then(() => { actionLoadMyContacts(); }); } }
    function startPersonalChat(tLog) { chatWith = tLog; document.getElementById("chatTargetLabel").innerText = "@" + tLog; const area = document.getElementById("areaMessages"); area.innerHTML = "Загрузка сообщений..."; const room = [myAccount, chatWith].sort().join("_"); isFirstLoadForRoom[room] = true; document.getElementById("boxMain").classList.remove("active"); setTimeout(() => { document.getElementById("boxChatRoom").classList.add("active"); }, 50); if(chatTimer) clearInterval(chatTimer); loadMessages(); chatTimer = setInterval(loadMessages, 3000); }
    function backToMainSearch() { if(chatWith) { fetch(URL_FB + "typing/" + chatWith + "/" + myAccount + ".json", { method: "PUT", body: "false" }); } chatWith = ""; if(chatTimer) clearInterval(chatTimer); document.getElementById("boxChatRoom").classList.remove("active"); setTimeout(() => { document.getElementById("boxMain").classList.add("active"); }, 50); actionLoadMyContacts(); }
    
    function loadMessages() {
        if (!chatWith) return; const room = [myAccount, chatWith].sort().join("_");
        fetch(URL_FB + "typing/" + myAccount + "/" + chatWith + ".json").then(r => r.json()).then(isTyping => {
            const label = document.getElementById("chatTargetLabel");
            if (isTyping === true) { label.innerText = "@" + chatWith + " (печатает...)"; } else { label.innerText = "@" + chatWith; }
        });
        
        document.getElementById("textInp").oninput = function() {
            fetch(URL_FB + "typing/" + chatWith + "/" + myAccount + ".json", { method: "PUT", body: "true" });
            clearTimeout(window.typingResetTimeout);
            window.typingResetTimeout = setTimeout(() => { fetch(URL_FB + "typing/" + chatWith + "/" + myAccount + ".json", { method: "PUT", body: "false" }); }, 2000);
        };

        fetch(URL_FB + "messages/" + room + ".json").then(r => r.json()).then(data => {
            const area = document.getElementById("areaMessages"); if (!data) { area.innerHTML = "Сообщений нет. Напишите первым!"; totalMessagesCount[room] = 0; isFirstLoadForRoom[room] = false; return; }
            if (area.innerHTML === "Загрузка сообщений..." || area.innerHTML === "Сообщений нет. Напишите первым!") { area.innerHTML = ""; }
            const msgIds = Object.keys(data).sort();
            msgIds.forEach(id => {
                const m = data[id]; if (!document.getElementById(id) && isFirstLoadForRoom[room] === false && m.sender !== myAccount) { triggerTopBanner(m.sender, m.text); }
                if (document.getElementById(id)) return;
                const div = document.createElement("div"); div.className = "msg " + (m.sender === myAccount ? "my" : "other"); div.id = id;
                if (m.text) { div.innerHTML += `<span>${m.text}</span>`; }
                if (m.file) { if (m.file.type?.startsWith("image/")) { div.innerHTML += `<img src="${m.file.data}">`; } else { div.innerHTML += `<a class="file-link" href="${m.file.data}" download="${m.file.name}">📂 ${m.file.name}</a>`; } }
                if (m.time) { const d = new Date(m.time); div.innerHTML += `<span class="msg-time" style="font-size:10px; opacity:0.6; align-self:flex-end; margin-top:4px;">${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}</span>`; }
                area.appendChild(div); area.scrollTop = area.scrollHeight;
            });
            totalMessagesCount[room] = msgIds.length; isFirstLoadForRoom[room] = false;
        });
    }
    function actionSend() {
        const text = document.getElementById("textInp").value.trim(); if (!text && !attachedFile) return; if (!chatWith) return;
        const room = [myAccount, chatWith].sort().join("_"); const msgId = "msg_" + Date.now(); const bodyMsg = { sender: myAccount, text: text, time: Date.now() }; if (attachedFile) bodyMsg.file = attachedFile;
        fetch(URL_FB + "messages/" + room + "/" + msgId + ".json", { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(bodyMsg) }).then(() => {
            fetch("https://onesignal.com", { method: "POST", headers: { "Content-Type": "application/json; charset=utf-8", "Authorization": "Basic fyk74f7gcuhuvbrpbgbnbepjg" }, body: JSON.stringify({ app_id: "a11bd4a6-a783-421e-b975-01f2f1b8a733", include_aliases: { "external_id": [chatWith] }, target_channel: "push", headings: { "en": `Новое от ${myAccount}` }, contents: { "en": text ? text : "Файл" } }) }).catch(() => {});
            document.getElementById("textInp").value = ""; attachedFile = null; const clip = document.getElementById("fileClipBtn"); clip.style.background = "transparent"; clip.innerHTML = "📎<input type='file' id='fileInp' style='display:none;' onchange='handleFileSelect(this)'>"; loadMessages();
        });
    }
</script>
