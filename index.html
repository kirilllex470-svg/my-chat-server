<html lang="ru">
<head>

    <style>
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes bubblePop {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        
        html, body { 
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e1135;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #1d2671 0%, #c33764 100%); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            box-sizing: border-box; 
            color: #fff; 
            -webkit-user-select: none;
            user-select: none;
        }
        
        .win { 
            background: rgba(20, 20, 35, 0.45); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            padding: 16px; 
            width: 100%; 
            max-width: 480px; 
            height: 100dvh; 
            display: none; 
            flex-direction: column; 
            box-sizing: border-box; 
            will-change: transform, opacity; 
        }
        
        .active { display: flex; animation: slideInRight 0.28s cubic-bezier(0.32, 0.94, 0.6, 1) forwards; }
        
        h3, h4 { margin: 0 0 12px 0; font-weight: 600; text-align: center; font-size: 16px; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 10px; 
            border: 1px solid rgba(255,255,255,0.15); 
            background: rgba(255,255,255,0.06); 
            border-radius: 14px; 
            font-size: 16px; 
            box-sizing: border-box; 
            color: #fff; 
            outline: none; 
            -webkit-appearance: none;
        }
        
        button { width: 100%; color: white; border: none; padding: 14px; font-size: 15px; border-radius: 14px; cursor: pointer; font-weight: bold; margin-bottom: 8px; transition: opacity 0.1s; -webkit-tap-highlight-color: transparent; }
        button:active { opacity: 0.8; }
        
        .box { border: 1px solid rgba(255,255,255,0.08); padding: 8px; background: rgba(0, 0, 0, 0.12); border-radius: 18px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 80%; font-size: 15px; word-wrap: break-word; display: flex; flex-direction: column; box-shadow: 0 1px 4px rgba(0,0,0,0.15); animation: bubblePop 0.15s cubic-bezier(0.1, 1, 0.1, 1); user-select: text; -webkit-user-select: text; }
        .msg.my { background: #2481cc; color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg.other { background: rgba(255,255,255,0.15); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 12px; margin-top: 4px; max-height: 200px; object-fit: cover; }
        
        /* SWIPE CONTAINER HIERARCHY ENGINE */
        .swipe-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 14px;
            margin-bottom: 6px;
            background: #dc3545; /* Red drawer background underneath */
            height: 52px;
            flex-shrink: 0;
        }
        
        /* The foreground moving card containing contact labels */
        .row { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 14px; 
            background: rgba(255,255,255,0.06); 
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 14px; 
            font-size: 15px; 
            cursor: pointer; 
            box-sizing: border-box;
            z-index: 2;
            transition: transform 0.15s cubic-bezier(0.1, 1, 0.1, 1);
            will-change: transform;
            touch-action: pan-y; /* Allows scrolling down while ignoring vertical movements */
            -webkit-tap-highlight-color: transparent; 
        }
        
        /* Hidden background delete text drawer button */
        .swipe-delete-btn {
            position: absolute;
            right: 0;
            top: 0;
            width: 80px;
            height: 100%;
            background: #dc3545;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            z-index: 1;
            cursor: pointer;
            border-radius: 0 14px 14px 0;
        }
        
        .admin-section { background: rgba(220, 53, 69, 0.12); border: 1px solid rgba(220, 53, 69, 0.25); border-radius: 16px; padding: 10px; margin-bottom: 10px; display: none; }
        
        .in-app-alert { position: fixed; top: -80px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; background: rgba(25, 25, 40, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 12px 16px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 9999; display: flex; flex-direction: column; gap: 4px; transition: top 0.3s cubic-bezier(0.1, 1, 0.1, 1); }
        .in-app-alert.show { top: 12px; }
        .in-app-title { font-weight: bold; font-size: 13px; color: #4fc3f7; }
        .in-app-body { font-size: 14px; color: #ffffff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .tg-input-bar { display: flex; align-items: center; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 22px; padding: 2px 10px; gap: 4px; box-sizing: border-box; flex: 1; position: relative; }
        .tg-field { flex: 1; background: transparent; border: none; outline: none; padding: 10px 2px; font-size: 16px; color: #fff; max-height: 90px; resize: none; font-family: inherit; }
        .tg-icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border-radius: 50%; -webkit-tap-highlight-color: transparent; }
        .tg-icon-btn:active { background: rgba(255,255,255,0.1); }
        .tg-send-btn { width: 40px; height: 40px; background: #2481cc; color: white; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; border-radius: 50%; border: none; outline: none; padding: 0; margin-left: 6px; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
        .tg-send-btn:active { background: #1c6aa8; transform: scale(0.96); }
        
        .tg-emoji-pop { position: absolute; bottom: 60px; left: 0; width: 100%; background: rgba(25, 20, 35, 0.96); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; box-shadow: 0 -8px 24px rgba(0,0,0,0.3); display: none; padding: 12px; box-sizing: border-box; grid-template-columns: repeat(5, 1fr); gap: 10px; z-index: 1000; justify-items: center; font-size: 24px; animation: bubblePop 0.12s ease-out; }
        .tg-emoji-pop.open { display: grid; }
    </style>
</head>

        <span style="font-size: 13px; font-weight: bold; color: rgba(255,255,255,0.5); letter-spacing: 0.5px;">(МСБ55115) МЕССЕНДЖЕР</span>

<script>
    let myAccount = "", myID = "", chatWith = "", chatTimer = null;
    let attachedFile = null; let totalMessagesCount = {}; let isFirstLoadForRoom = {};
    const URL_FB = "https://my-chat-server-4o0j.onrender.com/"; 

    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
            appId: "a11bd4a6-a783-421e-b975-01f2f1b8a733",
            autoRegister: true,
            notifyButton: { enable: false },
            workerPath: "OneSignalSDKWorker.js",
            registrationScope: "/"
        });
        if (myAccount) { OneSignal.login(myAccount); }
    });

    function toggleEmojiTray(event) {
        event.stopPropagation();
        document.getElementById("emojiPopTray").classList.toggle("open");
    }
    
    document.addEventListener("click", function() {
        document.getElementById("emojiPopTray").classList.remove("open");
    });

    function triggerTopBanner(sender, text) {
        const b = document.getElementById("inAppNotification");
        document.getElementById("inAppTitle").innerText = `💬 Новое от @${sender}`;
        document.getElementById("inAppBody").innerText = text ? text : "📎 Отправил вам файл";
        b.classList.add("show"); setTimeout(closeInAppAlert, 4000);
    }
    function closeInAppAlert() { document.getElementById("inAppNotification").classList.remove("show"); }
    function addEmoji(emoji) { const input = document.getElementById("textInp"); input.value += emoji; input.focus(); }

    function handleFileSelect(input) {
        const file = input.files; if (!file) return;
        if (file.size > 2 * 1024 * 1024) { alert("Файл слишком большой! Максимум 2 МБ."); input.value = ""; return; }
        const reader = new FileReader();
        reader.onload = function(e) {
            attachedFile = { name: file.name, type: file.type, data: e.target.result };
            const clip = document.getElementById("fileClipBtn");
            clip.style.background = "rgba(40, 167, 69, 0.3)";
            clip.innerText = "✅";
        };
        reader.readAsDataURL(file);
    }
